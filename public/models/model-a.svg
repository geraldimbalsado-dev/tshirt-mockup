<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 380" fill="none">
  <!-- Background -->
  <rect width="300" height="380" fill="#F5F5F0"/>

  <!-- Body silhouette -->
  <ellipse cx="150" cy="95" rx="40" ry="43" fill="#D4C5B0"/>

  <!-- Neck -->
  <rect x="138" y="130" width="24" height="20" rx="4" fill="#D4C5B0"/>

  <!-- White T-shirt -->
  <path d="M90 148 L110 138 L138 150 L162 150 L190 138 L210 148 L220 220 L80 220 Z" fill="#FFFFFF" stroke="#E8E8E4" stroke-width="1"/>

  <!-- Shirt sleeves -->
  <path d="M90 148 L68 175 L82 182 L105 160 Z" fill="#FFFFFF" stroke="#E8E8E4" stroke-width="1"/>
  <path d="M210 148 L232 175 L218 182 L195 160 Z" fill="#FFFFFF" stroke="#E8E8E4" stroke-width="1"/>

  <!-- Design area placeholder on shirt -->
  <rect x="125" y="160" width="50" height="45" rx="3" fill="#EBEBEB" opacity="0.8"/>
  <text x="150" y="187" font-family="system-ui, sans-serif" font-size="9" fill="#AAAAAA" text-anchor="middle">design</text>
  <text x="150" y="198" font-family="system-ui, sans-serif" font-size="9" fill="#AAAAAA" text-anchor="middle">here</text>

  <!-- Pants -->
  <path d="M80 220 L220 220 L215 310 L170 310 L150 265 L130 310 L85 310 Z" fill="#2C2C2C"/>

  <!-- Shoes -->
  <ellipse cx="120" cy="318" rx="28" ry="10" fill="#1A1A1A"/>
  <ellipse cx="180" cy="318" rx="28" ry="10" fill="#1A1A1A"/>

  <!-- Model A label -->
  <text x="150" y="355" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#555555" text-anchor="middle" letter-spacing="3">STREETWEAR</text>
  <text x="150" y="370" font-family="system-ui, sans-serif" font-size="9" fill="#999999" text-anchor="middle" letter-spacing="1">Minimalist · Urban</text>
</svg>
