<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 380" fill="none">
  <!-- Background -->
  <rect width="300" height="380" fill="#F0F4FF"/>

  <!-- Body silhouette - athletic build (wider shoulders) -->
  <ellipse cx="150" cy="92" rx="38" ry="40" fill="#C8B89A"/>

  <!-- Neck -->
  <rect x="138" y="126" width="24" height="18" rx="4" fill="#C8B89A"/>

  <!-- Athletic T-shirt (slim fit, brighter) -->
  <path d="M88 144 L108 132 L138 147 L162 147 L192 132 L212 144 L225 215 L75 215 Z" fill="#1B3FE8" stroke="#1530C5" stroke-width="1"/>

  <!-- Shirt sleeves (shorter, athletic cut) -->
  <path d="M88 144 L64 168 L80 178 L103 155 Z" fill="#1B3FE8" stroke="#1530C5" stroke-width="1"/>
  <path d="M212 144 L236 168 L220 178 L197 155 Z" fill="#1B3FE8" stroke="#1530C5" stroke-width="1"/>

  <!-- White design area placeholder on shirt -->
  <rect x="123" y="157" width="54" height="42" rx="3" fill="#FFFFFF" opacity="0.2"/>
  <text x="150" y="181" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle" opacity="0.7">design</text>
  <text x="150" y="192" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle" opacity="0.7">here</text>

  <!-- Athletic shorts -->
  <path d="M75 215 L225 215 L218 288 L174 288 L150 255 L126 288 L82 288 Z" fill="#111827"/>

  <!-- Socks & shoes -->
  <rect x="96" y="288" width="42" height="16" rx="2" fill="#FFFFFF"/>
  <rect x="162" y="288" width="42" height="16" rx="2" fill="#FFFFFF"/>
  <ellipse cx="117" cy="312" rx="32" ry="11" fill="#222222"/>
  <ellipse cx="183" cy="312" rx="32" ry="11" fill="#222222"/>

  <!-- Side stripe on shorts -->
  <line x1="82" y1="215" x2="82" y2="288" stroke="#1B3FE8" stroke-width="3" opacity="0.5"/>
  <line x1="218" y1="215" x2="218" y2="288" stroke="#1B3FE8" stroke-width="3" opacity="0.5"/>

  <!-- Label -->
  <text x="150" y="348" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1B3FE8" text-anchor="middle" letter-spacing="3">ACTIVEWEAR</text>
  <text x="150" y="363" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle" letter-spacing="1">Athletic · Performance</text>
</svg>
